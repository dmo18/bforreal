name: Validate and deploy Bitachon For Real

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.1.0
        with:
          version: 11.7.0
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Synchronize version
        run: node scripts/sync-version.mjs
      - name: Validate formatting
        run: pnpm format:check
      - name: Run ESLint
        run: pnpm lint
      - name: Check TypeScript
        run: pnpm typecheck
      - name: Run tests
        run: pnpm test
      - name: Validate version
        run: pnpm validate:version
      - name: Validate declarative source
        run: pnpm validate:source
      - name: Validate local assets
        run: pnpm validate:assets
      - name: Validate secret patterns
        run: pnpm validate:secrets
      - name: Build and validate static export
        run: pnpm build && pnpm validate:export
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./out

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: quality-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90192df42c6f7c76e44b5e50c37441a8876e # v4.0.5
