name: Validate and deploy Bitachon For Real

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup pnpm
        # pnpm/action-setup v4.1.0
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: 11.7.0
          run_install: false
      - name: Setup Node
        # actions/setup-node v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run complete quality gate
        run: pnpm check
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        # actions/upload-pages-artifact v3.0.1
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: ./out

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: quality-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages v4.0.5
        uses: actions/deploy-pages@d6db90192df42c6f7c76e44b5e50c37441a8876e
