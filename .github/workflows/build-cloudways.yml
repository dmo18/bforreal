name: Build Cloudways branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudways-production
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static website for Cloudways
        env:
          PAGES_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: https://www.bitachonforreal.com/
        run: pnpm build

      - name: Add Cloudways deployment files
        run: |
          touch out/.nojekyll
          cat > out/.htaccess <<'EOF'
          RewriteEngine On
          RewriteCond %{HTTP_HOST} ^bitachonforreal\.com$ [NC]
          RewriteRule ^ https://www.bitachonforreal.com%{REQUEST_URI} [R=301,L]
          EOF

      - name: Publish web-ready files to cloudways branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: cloudways
          publish_dir: ./out
          force_orphan: true
          enable_jekyll: false
          commit_message: "Build Cloudways website from ${{ github.sha }}"
