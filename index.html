<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bforreal</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ed;
        --fg: #1e1a16;
        --accent: #8c3d1f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #fff9ef 0%, var(--bg) 55%, #ece3d3 100%);
        color: var(--fg);
        font-family: Georgia, "Times New Roman", serif;
      }
      main {
        text-align: center;
        padding: 3rem 1.5rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2.5rem, 7vw, 5rem);
        letter-spacing: 0.04em;
      }
      p {
        margin: 0;
        font-size: 1.1rem;
      }
      .tag {
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.8rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="tag">Fresh start</div>
      <h1>Bitachon For Real</h1>
      <p>This site is live and ready for the next build.</p>
    </main>
  </body>
</html>
