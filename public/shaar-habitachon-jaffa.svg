<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 380" role="img" aria-labelledby="title desc">
  <title id="title">Shaar HaBitachon of Chovos Halevavos, Jaffa Family Edition</title>
  <desc id="desc">A vector rendering of the dark brown and gold Jaffa Family Edition book cover.</desc>
  <defs>
    <linearGradient id="leather" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a110f"/>
      <stop offset="0.48" stop-color="#2b1a16"/>
      <stop offset="1" stop-color="#130d0c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2cf78"/>
      <stop offset="0.45" stop-color="#b9822f"/>
      <stop offset="1" stop-color="#f1bd59"/>
    </linearGradient>
    <pattern id="grain" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 18 18 0M-5 5 5-5M13 23 23 13" stroke="#fff" stroke-opacity=".025" stroke-width="1"/>
      <circle cx="5" cy="5" r=".7" fill="#fff" fill-opacity=".035"/>
      <circle cx="14" cy="12" r=".6" fill="#000" fill-opacity=".12"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-20%" width="170%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="24" y="12" width="214" height="350" rx="4" fill="#0e0908"/>
    <path d="M20 18h210c6 0 10 4 10 10v320c0 8-5 14-13 14H20z" fill="url(#leather)"/>
    <path d="M20 18h210c6 0 10 4 10 10v320c0 8-5 14-13 14H20z" fill="url(#grain)"/>
    <path d="M20 18h12v344H20z" fill="#090605" opacity=".72"/>
    <path d="M32 28h196v324H32z" fill="none" stroke="url(#gold)" stroke-width="2.2"/>
    <path d="M39 36h182v308H39z" fill="none" stroke="#8b5d27" stroke-width=".8" opacity=".9"/>
    <path d="M48 52h164l10 10v256l-10 10H48l-10-10V62z" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
    <path d="M48 62h18l8-8h112l8 8h18M48 318h18l8 8h112l8-8h18" fill="none" stroke="#a87531" stroke-width="1"/>

    <text x="130" y="83" text-anchor="middle" fill="#d8a84b" font-family="Georgia, serif" font-size="10" letter-spacing="1.4">JAFFA FAMILY EDITION</text>
    <text x="130" y="111" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="22" font-weight="700" direction="rtl">שער הביטחון</text>
    <text x="130" y="132" text-anchor="middle" fill="#c58d38" font-family="Georgia, serif" font-size="13" direction="rtl">מתוך חובות הלבבות</text>

    <text x="130" y="171" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="27" font-weight="700" letter-spacing=".8">SHAAR</text>
    <text x="130" y="201" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="26" font-weight="700" letter-spacing=".4">HABITACHON</text>
    <text x="130" y="222" text-anchor="middle" fill="#d4a149" font-family="Georgia, serif" font-size="14" font-weight="700">OF</text>
    <text x="130" y="252" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="25" font-weight="700" letter-spacing=".6">CHOVOS</text>
    <text x="130" y="282" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="25" font-weight="700" letter-spacing=".4">HALEVAVOS</text>

    <path d="M66 301h128" stroke="#9e6d2b" stroke-width=".8"/>
    <path d="M113 309h34" stroke="url(#gold)" stroke-width="1.4"/>
    <text x="130" y="338" text-anchor="middle" fill="#c58d38" font-family="Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1.8">ARTSCROLL</text>
  </g>
</svg>
